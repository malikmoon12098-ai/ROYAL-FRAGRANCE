<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEV AI - Premium Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>
    <meta name="theme-color" content="#1a1a2e">
</head>
<body class="dark">
    <div id="pwa-install-banner" class="hidden">
        <span>Add to Home Screen?</span>
        <button id="install-btn">Yes</button>
    </div>

    <div class="app-container">
        <!-- Logo Section -->
        <header>
            <div class="logo-wrapper">
                <img src="logo.svg" alt="DEV AI Logo" class="app-logo" onerror="this.src='https://via.placeholder.com/150?text=DEV+AI'">
                <h1>DEV AI</h1>
            </div>
            <div id="drop-zone" class="drop-area">
                <p>Khichiye aur phenkiye (Folder) yahan ya <span id="select-folder">click karein</span></p>
            </div>
        </header>

        <!-- Main App Content -->
        <main class="chat-wrapper">
            <div id="chat-messages" class="messages-container">
                <div class="message system">
                    <p>Assalam-o-Alaikum! Main DEV AI hoon. Mujhy koi folder dein aur batayein kia kaam karna hai.</p>
                </div>
            </div>

            <!-- Context Info -->
            <div id="folder-info" class="folder-status hidden">
                <span id="current-folder-name"></span>
                <button id="clear-folder" title="Close Folder">×</button>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="api-key-config" id="api-config">
                    <input type="password" id="api-key" placeholder="Enter Gemini API Key (Free tier)...">
                    <button id="save-key">Bachao (Save)</button>
                </div>
                <div class="chat-input-container">
                    <textarea id="user-input" placeholder="Yahan apna sawal likhein..." rows="1"></textarea>
                    <button id="send-btn">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
